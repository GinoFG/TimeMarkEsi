<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Evidencia de Campo - ESI</title>
<style>
  :root{
    --azul:#0b3d66;
    --azul-claro:#1568a6;
    --azul-fondo:#eef4fa;
    --gris:#4a5560;
    --gris-claro:#f4f6f8;
    --verde:#1c8a4c;
    --rojo:#c62828;
    --amarillo:#e0a800;
    --borde:#d7dee5;
    --blanco:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
    background:var(--gris-claro);
    color:#1c2530;
    -webkit-tap-highlight-color:transparent;
  }
  header{
    background:var(--azul);
    color:#fff;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:50;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.3px;}
  header .sub{font-size:11px;opacity:.85;margin-top:2px;}
  .screen{display:none;padding:16px;max-width:520px;margin:0 auto;padding-bottom:100px;}
  .screen.active{display:block;}

  /* --- Config screen --- */
  .card{
    background:#fff;
    border:1px solid var(--borde);
    border-radius:12px;
    padding:18px;
    margin-bottom:14px;
  }
  label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--gris);
    margin-bottom:6px;
    margin-top:14px;
  }
  label:first-child{margin-top:0;}
  select,input[type=text]{
    width:100%;
    padding:12px;
    border:1.5px solid var(--borde);
    border-radius:8px;
    font-size:15px;
    background:#fff;
    color:#1c2530;
  }
  select:focus,input:focus{outline:none;border-color:var(--azul-claro);}
  .logo-row{display:flex;align-items:center;gap:12px;margin-top:8px;}
  .logo-preview{
    width:52px;height:52px;border-radius:8px;border:1.5px dashed var(--borde);
    display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;
    background:#fafbfc;font-size:10px;color:#9aa5af;text-align:center;
  }
  .logo-preview img{width:100%;height:100%;object-fit:contain;}
  .btn-secondary{
    background:#fff;border:1.5px solid var(--borde);color:var(--gris);
    padding:9px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  }
  .btn-primary{
    width:100%;
    background:var(--azul-claro);
    color:#fff;
    border:none;
    padding:16px;
    border-radius:10px;
    font-size:16px;
    font-weight:700;
    margin-top:20px;
    cursor:pointer;
    box-shadow:0 3px 8px rgba(21,104,166,.3);
  }
  .btn-primary:disabled{background:#a9bcca;box-shadow:none;}
  .ratio-row{display:flex;gap:8px;margin-top:8px;}
  .ratio-chip{
    flex:1;padding:11px 4px;border-radius:8px;border:1.5px solid var(--borde);
    background:#fff;color:var(--gris);font-size:13.5px;font-weight:700;cursor:pointer;
  }
  .ratio-chip.active{
    background:var(--azul-claro);border-color:var(--azul-claro);color:#fff;
  }
  .hint{font-size:12px;color:#8a95a0;margin-top:6px;line-height:1.4;}

  /* --- Camera screen --- */
  #screenCamera{padding:0;max-width:none;padding-bottom:0;}
  .cam-wrap{position:relative;width:100%;background:#000;}
  #video{width:100%;display:block;max-height:70vh;object-fit:cover;background:#000;transform-origin:center center;transition:transform .15s ease;}
  #canvasHidden{display:none;}
  .gps-badge{
    position:absolute;top:10px;left:10px;right:10px;
    display:flex;justify-content:space-between;align-items:center;
    background:rgba(0,0,0,.55);color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;
  }
  .gps-dot{width:9px;height:9px;border-radius:50%;background:var(--amarillo);display:inline-block;margin-right:6px;flex-shrink:0;}
  .gps-dot.ok{background:var(--verde);}
  .gps-dot.bad{background:var(--rojo);}
  .stamp-guide{
    position:absolute;left:0;right:0;bottom:0;height:34%;
    background:linear-gradient(to top, rgba(0,0,0,0.5), rgba(0,0,0,0));
    border-top:2px dashed rgba(255,255,255,0.8);
    display:flex;align-items:flex-start;justify-content:center;
    pointer-events:none;
  }
  .stamp-guide span{
    margin-top:8px;color:#fff;font-size:11px;font-weight:700;
    background:rgba(0,0,0,0.45);padding:4px 12px;border-radius:12px;
    text-shadow:0 1px 2px rgba(0,0,0,.6);
  }
  .zoom-indicator{
    position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);color:#fff;
    padding:5px 11px;border-radius:14px;font-size:12px;font-weight:700;
    pointer-events:none;opacity:0;transition:opacity .2s;
  }
  .zoom-indicator.show{opacity:1;}
  .cam-controls{
    background:#111;
    padding:18px 16px 22px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  .shutter{
    width:74px;height:74px;border-radius:50%;
    background:#fff;border:5px solid #444;
    cursor:pointer;
  }
  .shutter:active{background:#ddd;}
  .cam-meta{
    padding:12px 16px;background:#fff;border-bottom:1px solid var(--borde);
    font-size:12.5px;color:var(--gris);display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
  }
  .cam-meta b{color:#1c2530;}
  .close-cam{
    position:absolute;left:16px;top:14px;background:rgba(255,255,255,.9);
    border:none;border-radius:6px;padding:8px 10px;font-size:13px;font-weight:700;color:var(--azul);
  }

  /* --- Gallery screen --- */
  .gallery-header{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;
  }
  .gallery-header h2{font-size:15px;margin:0;color:var(--azul);}
  .count-badge{
    background:var(--azul-fondo);color:var(--azul);font-size:12px;font-weight:700;
    padding:3px 10px;border-radius:20px;
  }
  .grid{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;
  }
  .thumb{
    background:#fff;border:1px solid var(--borde);border-radius:10px;overflow:hidden;
  }
  .thumb img{width:100%;height:130px;object-fit:cover;display:block;cursor:pointer;}
  .thumb .info{padding:8px 10px;font-size:11px;color:var(--gris);}
  .thumb .info b{display:block;font-size:12px;color:#1c2530;margin-bottom:2px;}
  .thumb .actions{display:flex;border-top:1px solid var(--borde);}
  .thumb .actions button{
    flex:1;border:none;background:#fff;padding:9px 4px;font-size:11.5px;font-weight:700;color:var(--azul-claro);
  }
  .thumb .actions button:first-child{border-right:1px solid var(--borde);}
  .thumb .actions button.del{color:var(--rojo);}
  .empty-state{
    text-align:center;color:#9aa5af;padding:50px 20px;font-size:13.5px;line-height:1.5;
  }
  .fab-bar{
    position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--borde);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom));
    display:flex;gap:10px;max-width:520px;margin:0 auto;
  }
  .fab-bar button{
    flex:1;padding:13px;border-radius:9px;font-size:13.5px;font-weight:700;border:none;cursor:pointer;
  }
  .fab-camera{background:var(--azul-claro);color:#fff;}
  .fab-share{background:var(--verde);color:#fff;}
  .fab-download{background:#fff;color:var(--azul);border:1.5px solid var(--azul-claro) !important;}
  .toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:#1c2530;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;
    opacity:0;transition:opacity .25s;pointer-events:none;z-index:100;white-space:nowrap;
  }
  .toast.show{opacity:1;}
  .nueva-sesion{
    text-align:center;margin-top:16px;
  }
  .nueva-sesion a{color:var(--rojo);font-size:12.5px;font-weight:600;text-decoration:none;}

  .lightbox{
    position:fixed;inset:0;background:rgba(0,0,0,.92);
    display:none;align-items:center;justify-content:center;flex-direction:column;
    z-index:200;padding:20px;
  }
  .lightbox.show{display:flex;}
  .lightbox img{max-width:100%;max-height:72vh;border-radius:8px;object-fit:contain;}
  .lightbox-close{
    position:absolute;top:18px;right:18px;background:rgba(255,255,255,.15);color:#fff;
    border:none;border-radius:50%;width:38px;height:38px;font-size:16px;
  }
  .lightbox-actions{display:flex;gap:10px;margin-top:18px;width:100%;max-width:420px;}
  .lightbox-actions button{flex:1;padding:13px;border-radius:9px;font-size:13.5px;font-weight:700;border:none;}
  #lightboxDownload{background:#fff;color:var(--azul);}
  #lightboxShare{background:var(--verde);color:#fff;}
</style>
</head>
<body>

<header>
  <div>
    <h1>Evidencia de Campo</h1>
    <div class="sub" id="headerSub">Electronic Systems International S.A.</div>
  </div>
  <button class="btn-secondary" id="btnHome" style="display:none;font-size:12px;padding:7px 10px;">Config</button>
</header>

<!-- PANTALLA 1: CONFIGURACION -->
<div class="screen active" id="screenConfig">
  <div class="card">
    <label>Técnico responsable</label>
    <select id="selTecnico">
      <option value="">Seleccionar...</option>
      <option>Pier Ballón Coloma</option>
      <option>Jonathan Gamio Piminchumo</option>
      <option>John Rios Gomez</option>
      <option>Jhunnior Vasquez Vasquez</option>
      <option>Victor Soberon Tomasto</option>
      <option>Ing. Víctor Encinas</option>
      <option value="__otro__">Otro (escribir)...</option>
    </select>
    <input type="text" id="txtTecnicoOtro" placeholder="Nombre del técnico" style="display:none;margin-top:8px;">

    <label>Cliente / Planta / Proyecto</label>
    <input type="text" id="txtCliente" placeholder="Ej: Alicorp - Molino Callao">

    <label>OT (Orden de Trabajo)</label>
    <input type="text" id="txtOT" placeholder="Ej: 123-2X">

    <label>Área</label>
    <input type="text" id="txtArea" placeholder="Ej: Molienda">

    <label>Equipo (opcional)</label>
    <input type="text" id="txtEquipo" placeholder="Ej: Motor ventilador 01">

    <label>Estampa</label>
    <div class="ratio-row" id="sombraRow">
      <button type="button" class="ratio-chip active" data-sombra="si">Con sombra</button>
      <button type="button" class="ratio-chip" data-sombra="no">Sin sombra</button>
    </div>

    <label>Proporción de la foto</label>
    <div class="ratio-row" id="ratioRow">
      <button type="button" class="ratio-chip" data-ratio="1:1">1:1</button>
      <button type="button" class="ratio-chip" data-ratio="2:3">2:3</button>
      <button type="button" class="ratio-chip active" data-ratio="4:5">4:5</button>
      <button type="button" class="ratio-chip" data-ratio="9:16">9:16</button>
    </div>

    <button class="btn-primary" id="btnIniciar" disabled>Iniciar tomas</button>
    <div class="hint" id="hintSesionPrevia" style="display:none;"></div>
  </div>
</div>

<!-- PANTALLA 2: CAMARA -->
<div class="screen" id="screenCamera">
  <div class="cam-meta">
    <div>👤 <b id="metaTecnico">-</b></div>
    <div>🏭 <b id="metaCliente">-</b></div>
  </div>
  <div class="cam-wrap">
    <button class="close-cam" id="btnCerrarCam">✕ Cerrar cámara</button>
    <video id="video" autoplay playsinline muted></video>
    <div class="gps-badge">
      <span><span class="gps-dot" id="gpsDot"></span><span id="gpsText">Obteniendo ubicación...</span></span>
      <span id="gpsAcc"></span>
    </div>
    <div class="stamp-guide" id="stampGuide"><span>Aquí aparecerá la estampa</span></div>
    <div class="zoom-indicator" id="zoomIndicator">1.0x</div>
  </div>
  <div class="cam-controls">
    <div class="shutter" id="btnCapturar"></div>
  </div>
</div>
<canvas id="canvasHidden"></canvas>

<!-- PANTALLA 3: GALERIA -->
<div class="screen" id="screenGaleria">
  <div class="gallery-header">
    <h2 id="galeriaTitulo">Fotos de la sesión</h2>
    <span class="count-badge"><span id="galeriaCount">0</span> fotos</span>
  </div>
  <div id="galeriaVacia" class="empty-state">
    Aún no has tomado fotos.<br>Toca "Tomar foto" abajo para empezar.
  </div>
  <div class="grid" id="galeriaGrid"></div>

  <div class="nueva-sesion">
    <a href="#" id="linkNuevaSesion">Terminar y empezar una nueva sesión</a>
  </div>
</div>

<div class="fab-bar" id="fabBar">
  <button class="fab-camera" id="fabCamera">📷 Tomar foto</button>
  <button class="fab-share" id="fabShareAll">Compartir todas</button>
  <button class="fab-download" id="fabDownloadAll">Descargar todas</button>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="Foto">
  <div class="lightbox-actions">
    <button id="lightboxDownload">Descargar</button>
    <button id="lightboxShare">Compartir</button>
  </div>
</div>

<div class="toast" id="toast"></div>

  var _logoFallbackCache = null;
  function generarLogoFallback(){
    if(_logoFallbackCache) return _logoFallbackCache;
    var c = document.createElement("canvas");
    c.width = 240; c.height = 120;
    var g = c.getContext("2d");
    g.fillStyle = "#0b3d66";
    g.fillRect(0,0,240,120);
    g.fillStyle = "#ffffff";
    g.font = "700 46px Arial";
    g.textAlign = "center";
    g.textBaseline = "middle";
    g.fillText("ESI", 120, 64);
    _logoFallbackCache = c.toDataURL("image/png");
    return _logoFallbackCache;
  }
  function obtenerLogoDataUrl(){
    return ESI_LOGO_B64 || generarLogoFallback();
  }

  // ---------- Iniciales del técnico ----------
  function iniciales(nombre){
    if(!nombre) return "";
    var partes = nombre.trim().split(/\s+/).filter(function(p){
      var limpio = p.replace(/\./g,"");
      return limpio.length > 0 && !/^(ing|sr|sra|srta|lic|dr|dra|mg|mba)$/i.test(limpio);
    });
    return partes.slice(0,2).map(function(p){ return p.charAt(0).toUpperCase(); }).join("");
  }

  var STORAGE_KEY = "esi_evidencia_campo_v1";

  // ---------- Utilidades ----------
  function $(id){ return document.getElementById(id); }
  function showScreen(id){
    document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
    $(id).classList.add("active");
    $("btnHome").style.display = (id==="screenConfig") ? "none" : "inline-block";
    $("fabBar").style.display = (id==="screenGaleria") ? "flex" : "none";
  }
  function toast(msg){
    var t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toast._tm);
    toast._tm = setTimeout(function(){ t.classList.remove("show"); }, 2200);
  }
  function pad(n){ return n<10 ? "0"+n : ""+n; }
  function formatFecha(d){
    return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear()+"  "+pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
  }
  function persist(){
    try{
      var toSave = {
        tecnico: state.tecnico, cliente: state.cliente, equipo: state.equipo,
        ot: state.ot, area: state.area, aspectRatio: state.aspectRatio, estampaSombra: state.estampaSombra,
        fotos: state.fotos
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    }catch(e){ console.warn("No se pudo guardar sesión local:", e); }
  }
  function loadPersisted(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      return JSON.parse(raw);
    }catch(e){ return null; }
  }

  // ---------- Config screen ----------
  var selTecnico = $("selTecnico"), txtTecnicoOtro = $("txtTecnicoOtro"), txtCliente = $("txtCliente");
  var txtEquipo = $("txtEquipo");
  var txtOT = $("txtOT"), txtArea = $("txtArea");
  var btnIniciar = $("btnIniciar");

  function validarConfig(){
    var tecnicoOk = selTecnico.value && (selTecnico.value !== "__otro__" || txtTecnicoOtro.value.trim());
    var clienteOk = txtCliente.value.trim().length > 0;
    btnIniciar.disabled = !(tecnicoOk && clienteOk);
  }
  selTecnico.addEventListener("change", function(){
    txtTecnicoOtro.style.display = (selTecnico.value === "__otro__") ? "block" : "none";
    validarConfig();
  });
  txtTecnicoOtro.addEventListener("input", validarConfig);
  txtCliente.addEventListener("input", validarConfig);

  var sombraRow = $("sombraRow");
  sombraRow.querySelectorAll(".ratio-chip").forEach(function(chip){
    chip.addEventListener("click", function(){
      sombraRow.querySelectorAll(".ratio-chip").forEach(function(c){ c.classList.remove("active"); });
      chip.classList.add("active");
      state.estampaSombra = (chip.getAttribute("data-sombra") === "si");
      persist();
    });
  });

  var ratioRow = $("ratioRow");
  ratioRow.querySelectorAll(".ratio-chip").forEach(function(chip){
    chip.addEventListener("click", function(){
      ratioRow.querySelectorAll(".ratio-chip").forEach(function(c){ c.classList.remove("active"); });
      chip.classList.add("active");
      state.aspectRatio = chip.getAttribute("data-ratio");
      persist();
    });
  });

  btnIniciar.addEventListener("click", function(){
    state.tecnico = (selTecnico.value === "__otro__") ? txtTecnicoOtro.value.trim() : selTecnico.value;
    state.cliente = txtCliente.value.trim();
    state.equipo = txtEquipo.value.trim();
    state.ot = txtOT.value.trim();
    state.area = txtArea.value.trim();
    persist();
    actualizarGaleriaHeader();
    iniciarGPS();
    showScreen("screenGaleria");
    renderGaleria();
  });

  $("btnHome").addEventListener("click", function(){
    showScreen("screenConfig");
  });

  function actualizarGaleriaHeader(){
    $("metaTecnico").textContent = state.tecnico || "-";
    $("metaCliente").textContent = state.cliente || "-";
    $("galeriaTitulo").textContent = state.cliente || "Fotos de la sesión";
    $("headerSub").textContent = state.tecnico ? (state.tecnico + " · " + state.cliente) : "Electronic Systems International S.A.";
  }

        if(link){
          link.addEventListener("click", function(e){
            e.preventDefault();
            state.tecnico = saved.tecnico; state.cliente = saved.cliente;
            state.equipo = saved.equipo || ""; state.fotos = saved.fotos || [];
            state.ot = saved.ot || ""; state.area = saved.area || "";
            if(saved.aspectRatio && RATIOS[saved.aspectRatio]){
              state.aspectRatio = saved.aspectRatio;
              ratioRow.querySelectorAll(".ratio-chip").forEach(function(c){
                c.classList.toggle("active", c.getAttribute("data-ratio") === state.aspectRatio);
              });
            }
            actualizarGaleriaHeader();
            iniciarGPS();
            showScreen("screenGaleria");
            renderGaleria();
          });
        }
      }, 0);
    }
  })();

  // ---------- GPS ----------
  var gpsDot = $("gpsDot"), gpsText = $("gpsText"), gpsAcc = $("gpsAcc");
  function iniciarGPS(){
    if(!navigator.geolocation){
      gpsText.textContent = "GPS no disponible en este navegador";
      gpsDot.className = "gps-dot bad";
      return;
    }
    if(state.watchId) return;
    gpsDot.className = "gps-dot";
    gpsText.textContent = "Obteniendo ubicación...";
    state.watchId = navigator.geolocation.watchPosition(function(pos){
      state.lastPos = pos;
      gpsDot.className = "gps-dot ok";
      gpsText.textContent = pos.coords.latitude.toFixed(6) + ", " + pos.coords.longitude.toFixed(6);
      gpsAcc.textContent = "±" + Math.round(pos.coords.accuracy) + "m";
    }, function(err){
      gpsDot.className = "gps-dot bad";
      gpsText.textContent = "Sin señal GPS (" + err.message + ")";
    }, { enableHighAccuracy:true, maximumAge:4000, timeout:15000 });
  }

  // ---------- Dirección a partir de GPS (geocodificación inversa) ----------
  function conTimeout(promesa, ms){
    return Promise.race([
      promesa,
      new Promise(function(resolve){ setTimeout(function(){ resolve(null); }, ms); })
    ]);
  }
  function distanciaAprox(lat1, lon1, lat2, lon2){
    var dLat = lat1-lat2, dLon = lon1-lon2;
    return Math.sqrt(dLat*dLat + dLon*dLon);
  }
  function obtenerDireccion(lat, lon){
    var url = "https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat="+lat+"&lon="+lon+"&zoom=18&addressdetails=1&accept-language=es";
    return fetch(url).then(function(r){ return r.json(); }).then(function(data){
      var a = data && data.address ? data.address : {};
      var calle = a.road || a.pedestrian || a.footway || a.street || "";
      var numero = a.house_number || "";
      var zona = a.suburb || a.city_district || a.town || a.city || a.village || "";
      var partes = [];
      if(calle){ partes.push(calle + (numero ? " " + numero : "")); }
      if(zona){ partes.push(zona); }
      return partes.length ? partes.join(", ") : null;
    }).catch(function(){ return null; });
  }
  var GEOCODE_CACHE_MS = 5*60*1000;
  var GEOCODE_CACHE_DIST = 0.00025; // ~25m
  function obtenerDireccionCacheada(lat, lon){
    var c = state.lastGeocode;
    if(c && (Date.now()-c.ts) < GEOCODE_CACHE_MS && distanciaAprox(lat,lon,c.lat,c.lon) < GEOCODE_CACHE_DIST){
      return Promise.resolve(c.address);
    }
    return obtenerDireccion(lat, lon).then(function(addr){
      state.lastGeocode = { lat:lat, lon:lon, address:addr, ts:Date.now() };
      return addr;
    });
  }

  // ---------- Camara ----------
  var video = $("video"), camWrap = document.querySelector(".cam-wrap");
  function ajustarProporcionVideo(){
    var ratio = RATIOS[state.aspectRatio] || RATIOS["4:5"]; // ancho/alto
    var availW = camWrap.clientWidth || window.innerWidth;
    var maxH = Math.round(window.innerHeight * 0.62);
    var finalW, finalH, candH = Math.round(availW / ratio);
    if(candH <= maxH){
      finalW = availW; finalH = candH;
    } else {
      finalH = maxH; finalW = Math.round(maxH * ratio);
    }
    video.style.width = finalW + "px";
    video.style.height = finalH + "px";
    video.style.maxHeight = "none";
    video.style.margin = "0 auto";
  }
  window.addEventListener("resize", function(){
    if(camWrap.closest(".screen").classList.contains("active")){ ajustarProporcionVideo(); }
  });

  // ---------- Zoom por pellizco (pinch-to-zoom) ----------
  var zoomIndicator = $("zoomIndicator");
  var ZOOM_MIN = 1, ZOOM_MAX = 4;
  state.zoomDigital = 1;
  var pinch = { activo:false, distInicial:0, zoomInicial:1 };
  var zoomIndicatorTimer = null;

  function distanciaToques(touches){
    var dx = touches[0].clientX - touches[1].clientX;
    var dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  function mostrarZoomIndicator(){
    zoomIndicator.textContent = state.zoomDigital.toFixed(1) + "x";
    zoomIndicator.classList.add("show");
    clearTimeout(zoomIndicatorTimer);
    zoomIndicatorTimer = setTimeout(function(){ zoomIndicator.classList.remove("show"); }, 1200);
  }
  function aplicarZoomVisual(){
    video.style.transform = "scale(" + state.zoomDigital + ")";
    mostrarZoomIndicator();
  }
  video.addEventListener("touchstart", function(e){
    if(e.touches.length === 2){
      pinch.activo = true;
      pinch.distInicial = distanciaToques(e.touches);
      pinch.zoomInicial = state.zoomDigital;
    }
  }, { passive:true });
  video.addEventListener("touchmove", function(e){
    if(pinch.activo && e.touches.length === 2){
      e.preventDefault();
      var distActual = distanciaToques(e.touches);
      var factor = distActual / (pinch.distInicial || 1);
      var nuevoZoom = pinch.zoomInicial * factor;
      nuevoZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, nuevoZoom));
      state.zoomDigital = Math.round(nuevoZoom * 10) / 10;
      aplicarZoomVisual();
    }
  }, { passive:false });
  video.addEventListener("touchend", function(e){
    if(e.touches.length < 2){ pinch.activo = false; }
  });
  video.addEventListener("dblclick", function(){
    state.zoomDigital = 1;
    aplicarZoomVisual();
  });

  function abrirCamara(){
    showScreen("screenCamera");
    ajustarProporcionVideo();
    state.zoomDigital = 1;
    video.style.transform = "scale(1)";
    zoomIndicator.classList.remove("show");
    if(state.stream){ return; }
    navigator.mediaDevices.getUserMedia({ video:{ facingMode:"environment", width:{ideal:1920}, height:{ideal:1080} }, audio:false })
      .then(function(stream){
        state.stream = stream;
        video.srcObject = stream;
      })
      .catch(function(err){
        toast("No se pudo abrir la cámara: " + err.message);
        showScreen("screenGaleria");
      });
  }
  function cerrarCamara(){
    if(state.stream){
      state.stream.getTracks().forEach(function(t){ t.stop(); });
      state.stream = null;
    }
    showScreen("screenGaleria");
  }
  $("fabCamera").addEventListener("click", abrirCamara);
  $("btnCerrarCam").addEventListener("click", cerrarCamara);

  // ---------- Captura + sello ----------
  var canvas = $("canvasHidden");

  function roundRectPath(ctx, x, y, rw, rh, r){
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+rw-r, y);
    ctx.arcTo(x+rw, y, x+rw, y+r, r);
    ctx.lineTo(x+rw, y+rh-r);
    ctx.arcTo(x+rw, y+rh, x+rw-r, y+rh, r);
    ctx.lineTo(x+r, y+rh);
    ctx.arcTo(x, y+rh, x, y+rh-r, r);
    ctx.lineTo(x, y+r);
    ctx.arcTo(x, y, x+r, y, r);
    ctx.closePath();
  }

  function capturar(){
    if(!video.videoWidth){ toast("La cámara aún está cargando..."); return; }

    // ---- Recorte según la proporción elegida y el zoom digital de respaldo (si aplica) ----
    var zd = state.zoomDigital || 1;
    var vwFull = video.videoWidth, vhFull = video.videoHeight;
    var vw = Math.round(vwFull / zd), vh = Math.round(vhFull / zd);
    var offX = Math.round((vwFull - vw) / 2), offY = Math.round((vhFull - vh) / 2);
    var videoAspect = vw / vh, boxAspect = RATIOS[state.aspectRatio] || RATIOS["4:5"];
    var cropX, cropY, cropW, cropH;
    if(videoAspect > boxAspect){
      cropH = vh;
      cropW = Math.round(vh * boxAspect);
      cropX = Math.round((vw - cropW) / 2);
      cropY = 0;
    } else {
      cropW = vw;
      cropH = Math.round(vw / boxAspect);
      cropX = 0;
      cropY = Math.round((vh - cropH) / 2);
    }
    var w = cropW, h = cropH; // lo que el técnico realmente ve y enmarca en pantalla

    canvas.width = w;
    canvas.height = h;
    var ctx = canvas.getContext("2d");
    ctx.drawImage(video, cropX+offX, cropY+offY, cropW, cropH, 0, 0, w, h);

    var now = new Date();
    var coordsTxt = state.lastPos
      ? state.lastPos.coords.latitude.toFixed(6) + ", " + state.lastPos.coords.longitude.toFixed(6)
      : "Ubicación no disponible";
    var padPx = Math.round(w * 0.03);

    var logoPromise = new Promise(function(resolve){
      var img = new Image();
      img.onload = function(){ resolve(img); };
      img.onerror = function(){ resolve(null); };
      img.src = obtenerLogoDataUrl();
    });
    var direccionPromise = state.lastPos
      ? conTimeout(obtenerDireccionCacheada(state.lastPos.coords.latitude, state.lastPos.coords.longitude), 4000)
      : Promise.resolve(null);

    Promise.all([logoPromise, direccionPromise]).then(function(res){
      dibujarSelloYGuardar(res[0], res[1]);
    });

    function dibujarSelloYGuardar(logoImg, direccionTxt){
      var ubicacionTxt = direccionTxt || coordsTxt;

      // ---- Tamaños ----
      var badgeH = Math.round(h*0.058);
      var timeRowH = Math.round(h*0.075);
      var timeFS = Math.round(h*0.052);
      var dateFS = Math.round(h*0.019);
      var empresaFS = Math.round(h*0.027);
      var infoFS = Math.round(h*0.0205);
      var empresaRowH = Math.round(empresaFS*1.3);
      var infoRowH = Math.round(infoFS*1.3);
      var panelPad = Math.round(padPx*0.6);
      var gap = Math.round(padPx*0.12);

      // ---- Filas ----
      var filas = [];
      filas.push({ tipo:"logo", h:badgeH });
      filas.push({ tipo:"hora", h:timeRowH });
      filas.push({ tipo:"texto", h:empresaRowH, font:"800 "+empresaFS+"px Arial", text: state.cliente || "-" });
      if(state.area){ filas.push({ tipo:"texto", h:infoRowH, font:"600 "+infoFS+"px Arial", text:"Área: "+state.area }); }
      if(state.equipo){ filas.push({ tipo:"texto", h:infoRowH, font:"600 "+infoFS+"px Arial", text:"Equipo: "+state.equipo }); }
      if(state.ot){ filas.push({ tipo:"texto", h:infoRowH, font:"600 "+infoFS+"px Arial", text:"OT: "+state.ot }); }
      filas.push({ tipo:"texto", h:infoRowH, font:"600 "+infoFS+"px Arial", text: ubicacionTxt });
      filas.push({ tipo:"texto", h:infoRowH, font:"600 "+infoFS+"px Arial", text: iniciales(state.tecnico) });

      var contenidoH = filas.reduce(function(s,f){ return s+f.h; }, 0) + gap*(filas.length-1);
      var panelW = w - padPx*2;
      var panelH = panelPad*2 + contenidoH;
      var panelX = padPx, panelY = h - panelH - padPx;

      // ---- Panel semitransparente (opcional, según preferencia con/sin sombra) ----
      if(state.estampaSombra){
        ctx.save();
        ctx.fillStyle = "rgba(20,26,32,0.275)";
        roundRectPath(ctx, panelX, panelY, panelW, panelH, Math.round(padPx*0.45));
        ctx.fill();
        ctx.restore();
      }

      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#ffffff";
      if(!state.estampaSombra){
        ctx.shadowColor = "rgba(0,0,0,0.85)";
        ctx.shadowBlur = 6; ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1;
      }

      var cursorY = panelY + panelPad;
      var textX = panelX + panelPad;

      filas.forEach(function(fila){
        if(fila.tipo === "logo"){
          if(logoImg){
            var innerPad = Math.round(fila.h*0.14);
            var imgH = fila.h - innerPad*2;
            var imgW = Math.round(imgH * (logoImg.width/logoImg.height));
            var badgeW = imgW + innerPad*2;
            ctx.save();
            ctx.shadowColor = "transparent"; ctx.shadowBlur = 0;
            ctx.fillStyle = "#ffffff";
            roundRectPath(ctx, textX, cursorY, badgeW, fila.h, Math.round(fila.h*0.16));
            ctx.fill();
            ctx.drawImage(logoImg, textX+innerPad, cursorY+innerPad, imgW, imgH);
            ctx.restore();
            ctx.fillStyle = "#ffffff";
          }
        } else if(fila.tipo === "hora"){
          var mesesAbbr = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
          var diasAbbr = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
          var horaTxt = pad(now.getHours())+":"+pad(now.getMinutes());
          var fechaCortaTxt = now.getDate()+" de "+mesesAbbr[now.getMonth()]+" "+now.getFullYear();
          var diaSemanaTxt = diasAbbr[now.getDay()];

          ctx.font = "800 "+timeFS+"px Arial";
          var timeBaselineY = cursorY + fila.h/2 + timeFS*0.36;
          ctx.fillText(horaTxt, textX, timeBaselineY);
          var timeW = ctx.measureText(horaTxt).width;

          var dividerX = textX + timeW + Math.round(padPx*0.5);
          ctx.save();
          ctx.shadowColor = "transparent"; ctx.shadowBlur = 0;
          ctx.fillStyle = "#e0a800";
          ctx.fillRect(dividerX, cursorY, Math.round(padPx*0.14), fila.h);
          ctx.restore();
          ctx.fillStyle = "#ffffff";

          var dateX = dividerX + Math.round(padPx*0.6);
          ctx.font = "700 "+dateFS+"px Arial";
          ctx.fillText(fechaCortaTxt, dateX, cursorY + fila.h*0.44);
          ctx.fillText(diaSemanaTxt, dateX, cursorY + fila.h*0.44 + dateFS*1.5);
        } else {
          ctx.font = fila.font;
          ctx.fillText(fila.text, textX, cursorY + fila.h*0.78);
        }
        cursorY += fila.h + gap;
      });

      finalizarCaptura(ubicacionTxt);
    }

    function finalizarCaptura(ubicacionTxt){
      var dataUrl = canvas.toDataURL("image/jpeg", 0.92);
      var foto = {
        id: "f" + Date.now() + Math.random().toString(36).slice(2,7),
        dataUrl: dataUrl,
        fecha: now.toISOString(),
        fechaLegible: formatFecha(now),
        coords: ubicacionTxt,
        tecnico: state.tecnico,
        cliente: state.cliente,
        equipo: state.equipo,
        ot: state.ot,
        area: state.area
      };
      state.fotos.unshift(foto);
      persist();
      renderGaleria();
      cerrarCamara();
      if(navigator.share){
        toast("Toca \"Guardar imagen\" para guardarla en tu galería");
        compartirFotos([foto]);
      } else {
        toast("Foto guardada en la sesión");
      }
    }
  }
  $("btnCapturar").addEventListener("click", capturar);

  // ---------- Galeria ----------
  function renderGaleria(){
    var grid = $("galeriaGrid");
    var vacia = $("galeriaVacia");
    $("galeriaCount").textContent = state.fotos.length;
    if(state.fotos.length === 0){
      grid.innerHTML = "";
      vacia.style.display = "block";
      return;
    }
    vacia.style.display = "none";
    grid.innerHTML = state.fotos.map(function(f){
      return '<div class="thumb" data-id="'+f.id+'">'
        + '<img src="'+f.dataUrl+'">'
        + '<div class="info"><b>'+f.fechaLegible+'</b>'+ (f.coords||"") +'</div>'
        + '<div class="actions"><button class="del" style="width:100%;">Eliminar</button></div>'
      + '</div>';
    }).join("");

    grid.querySelectorAll(".thumb").forEach(function(el){
      var id = el.getAttribute("data-id");
      var foto = state.fotos.find(function(f){ return f.id === id; });
      el.querySelector("img").addEventListener("click", function(){ abrirLightbox(foto); });
      el.querySelector(".del").addEventListener("click", function(){
        if(confirm("¿Eliminar esta foto de la sesión?")){
          state.fotos = state.fotos.filter(function(f){ return f.id !== id; });
          persist();
          renderGaleria();
        }
      });
    });
  }

  function nombreArchivo(foto){
    function limpiar(txt, max){
      return (txt || "").toString().trim().replace(/[^a-z0-9]+/gi,"_").replace(/^_+|_+$/g,"").slice(0, max);
    }
    var partes = [
      limpiar(foto.cliente, 30) || "cliente",
      limpiar(foto.area, 20),
      limpiar(foto.equipo, 20),
      limpiar(foto.ot, 15),
      limpiar(foto.tecnico, 20) || "tecnico"
    ].filter(function(p){ return p; });
    var d = new Date(foto.fecha);
    var horaCorta = pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());
    return partes.join("_") + "_" + horaCorta + ".jpg";
  }

  function dataUrlToBlob(dataUrl){
    var parts = dataUrl.split(",");
    var mime = parts[0].match(/:(.*?);/)[1];
    var bstr = atob(parts[1]);
    var n = bstr.length;
    var u8 = new Uint8Array(n);
    while(n--){ u8[n] = bstr.charCodeAt(n); }
    return new Blob([u8], { type: mime });
  }

  function descargarFoto(foto){
    var a = document.createElement("a");
    a.href = foto.dataUrl;
    a.download = nombreArchivo(foto);
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    toast("Descargando foto...");
  }

  function compartirFotos(fotos){
    if(!navigator.share){
      toast("Este navegador no permite compartir directo. Usa Descargar.");
      return;
    }
    var files = fotos.map(function(f){
      return new File([dataUrlToBlob(f.dataUrl)], nombreArchivo(f), { type: "image/jpeg" });
    });
    var shareData = {
      files: files,
      title: "Evidencia de campo ESI",
      text: (state.cliente||"") + " - " + (state.tecnico||"")
    };
    if(navigator.canShare && !navigator.canShare(shareData)){
      toast("El navegador no puede compartir estos archivos. Usa Descargar.");
      return;
    }
    navigator.share(shareData).catch(function(err){
      if(err && err.name !== "AbortError") toast("No se pudo compartir: " + err.message);
    });
  }

  $("fabShareAll").addEventListener("click", function(){
    if(state.fotos.length === 0){ toast("No hay fotos en la sesión"); return; }
    compartirFotos(state.fotos);
  });
  $("fabDownloadAll").addEventListener("click", function(){
    if(state.fotos.length === 0){ toast("No hay fotos en la sesión"); return; }
    state.fotos.forEach(function(f, i){
      setTimeout(function(){ descargarFoto(f); }, i*350);
    });
  });

  // ---------- Visor de fotos (lightbox) ----------
  var lightbox = $("lightbox"), lightboxImg = $("lightboxImg");
  var fotoEnVisor = null;
  function abrirLightbox(foto){
    fotoEnVisor = foto;
    lightboxImg.src = foto.dataUrl;
    lightbox.classList.add("show");
  }
  function cerrarLightbox(){
    lightbox.classList.remove("show");
    fotoEnVisor = null;
  }
  $("lightboxClose").addEventListener("click", cerrarLightbox);
  lightbox.addEventListener("click", function(e){
    if(e.target === lightbox) cerrarLightbox();
  });
  $("lightboxDownload").addEventListener("click", function(){
    if(fotoEnVisor) descargarFoto(fotoEnVisor);
  });
  $("lightboxShare").addEventListener("click", function(){
    if(fotoEnVisor) compartirFotos([fotoEnVisor]);
  });

  $("linkNuevaSesion").addEventListener("click", function(e){
    e.preventDefault();
    if(state.fotos.length > 0 && !confirm("¿Terminar la sesión actual? Asegúrate de haber descargado o compartido tus fotos primero.")) return;
    state.fotos = [];
    state.tecnico = ""; state.cliente = ""; state.equipo = ""; state.ot = ""; state.area = "";
    selTecnico.value = ""; txtTecnicoOtro.value=""; txtTecnicoOtro.style.display="none";
    txtCliente.value = ""; txtEquipo.value = ""; txtOT.value = ""; txtArea.value = "";
    localStorage.removeItem(STORAGE_KEY);
    validarConfig();
    showScreen("screenConfig");
  });

})();
</script>
